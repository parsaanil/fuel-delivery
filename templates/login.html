{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:420px;">
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:2px;margin-bottom:.3rem;">SIGN <span class="accent">IN</span></h1>
    <p style="color:var(--muted);margin-bottom:2rem;font-size:.9rem;">Welcome back. Your road assistance awaits.</p>
    <div class="card">
      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-fuel" style="width:100%;justify-content:center;padding:.8rem;">Login →</button>
      </form>
      <p style="text-align:center;margin-top:1rem;font-size:.85rem;color:var(--muted);">No account? <a href="/register" style="color:var(--fuel);">Register here</a></p>
      <p style="text-align:center;margin-top:.5rem;font-size:.78rem;color:var(--muted);">Admin: admin@fuelaid.com / admin123</p>
    </div>
  </div>
</div>
{% endblock %}
